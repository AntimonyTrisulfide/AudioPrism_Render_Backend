services:
  - type: web
    name: audioprism-backend
    env: docker
    healthCheckPath: /healthz
    envVars:
      - key: MODEL_FILENAME
        value: model_render.pth
      - key: MODEL_URL
        sync: false
      - key: MAX_UPLOAD_MB
        value: "25"
      - key: MAX_AUDIO_SECONDS
        value: "0"
      - key: INFERENCE_CHUNK_SECONDS
        value: "0.5"
      - key: INFERENCE_FREQ_TILE_BINS
        value: "256"
      - key: INFERENCE_FREQ_OVERLAP_BINS
        value: "64"
      - key: INFERENCE_AUTOTUNE_FOR_RAM
        value: "1"
      - key: AUTH_REQUIRED
        value: "1"
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: audioprism
      - key: MONGO_REQUIRED
        value: "1"
      - key: JWT_SECRET
        sync: false
      - key: STORAGE_BACKEND
        value: supabase
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: SUPABASE_BUCKET
        value: audioprism-stems
      - key: SUPABASE_PUBLIC_BUCKET
        value: "0"
      - key: PUBLIC_BASE_URL
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: ALLOWED_ORIGIN_REGEX
        sync: false
      - key: OUTPUT_TTL_MINUTES
        value: "120"
      - key: INFERENCE_JOB_TTL_SECONDS
        value: "3600"
      - key: TORCH_NUM_THREADS
        value: "1"
      - key: RAM_LIMIT_MB
        value: "512"
      - key: TORCH_NUM_INTEROP_THREADS
        value: "1"
